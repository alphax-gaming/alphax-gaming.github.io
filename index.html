<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حالة البث المباشر</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .status-card {
            text-align: center;
            width: 100%;
            max-width: 550px;
            padding: 40px 30px;
            background-color: #1e293b;
            border-radius: 16px;
            border: 1px solid #334155;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        h1 { 
            color: #f59e0b; 
            font-size: 26px; 
            margin-top: 0;
            margin-bottom: 20px; 
        }
        p { 
            color: #f8fafc; 
            font-size: 18px; 
            line-height: 1.6; 
            margin: 10px 0; 
        }
        .lang-en { 
            direction: ltr; 
            font-family: sans-serif; 
            color: #94a3b8 !important; 
            font-size: 16px !important; 
            margin-top: 25px !important; 
            border-top: 1px solid #334155; 
            padding-top: 25px; 
        }
    </style>
</head>
<body>

    <div class="status-card">
        <h1>لا توجد مباريات هامة</h1>
        <p>لا توجد أي مباريات مهمة حالياً، سنعود عندما تبدأ مباراة قادمة مهمة.</p>
        
        <p class="lang-en">There are no important matches live right now. We will stand by and return when an important match begins.</p>
    </div>

</body>
</html>
