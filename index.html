<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إهداء لخالتي الحبيبة</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #d8a1a8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* حاوية الورود (الأنيميشن) */
        .petals-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; }
        .petal { position: absolute; background: white; opacity: 0.4; border-radius: 50% 0% 50% 50%; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }

        /* البطاقة الزجاجية (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 40px;
            width: 320px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.5s ease;
        }

        .time { font-size: 3.5rem; font-weight: 200; margin-bottom: 5px; }
        .date { font-size: 1.1rem; opacity: 0.8; margin-bottom: 30px; }

        input {
            width: 80%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 20px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-align: center;
        }

        button {
            background: #be123c;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .wishes { text-align: right; margin-top: 20px; line-height: 1.8; font-size: 0.95rem; }
    </style>
</head>
<body>

    <div class="petals-container" id="petals"></div>

    <div class="glass-card" id="main-card">
        <div class="time" id="clock">--:--</div>
        <div class="date" id="date">-- -- ----</div>
        
        <input type="text" id="pass" placeholder="اكتبي: احبك يا خالتي">
        <br>
        <button onclick="check()">فتح المفاجأة 🔓</button>
    </div>

    <script>
        // إعداد الوقت والتاريخ
        function updateDisplay() {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('date').innerText = now.toLocaleDateString('ar-SA', options);
        }
        setInterval(updateDisplay, 1000);
        updateDisplay();

        // إنشاء الورود
        const cont = document.getElementById('petals');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'petal';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.width = p.style.height = (Math.random() * 20 + 10) + 'px';
            p.style.animationDuration = (Math.random() * 10 + 10) + 's';
            cont.appendChild(p);
        }

        // التحقق
        function check() {
            if(document.getElementById('pass').value === "احبك يا خالتي") {
                document.getElementById('main-card').innerHTML = `
                    <h1>💝</h1>
                    <div style="font-size:2rem; font-weight:bold;">∞</div>
                    <p>معزتك بقلبي تتعدى كل الحدود! 🌹</p>
                    <div class="wishes">
                        🌸 <b>مكانتك:</b> أنتِ قطعة غالية ونادرة من قلبي.<br>
                        🤲 <b>للصحة:</b> اللهم البس خالتي ثوب العافية.<br>
                        ✨ <b>للراحة:</b> ربي املأ قلبها بالطمأنينة.<br>
                        🕌 <b>للحفظ:</b> استودعتك الله مبسم خالتي وقلبها.<br>
                        🎈 <b>أمنية:</b> عسى أيامك كلها مسرات.
                    </div>
                `;
            } else { alert("حاولي مرة أخرى!"); }
        }
    </script>
</body>
</html>
