<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <!-- Block All Search Engines & Robots -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noodp, noydir">
    <meta name="googlebot" content="noindex, nofollow">
    <meta name="bingbot" content="noindex, nofollow">
    <meta name="slurp" content="noindex, nofollow">
    <meta name="duckduckbot" content="noindex, nofollow">
    <meta name="baiduspider" content="noindex, nofollow">
    <meta name="yandex" content="noindex, nofollow">
    <meta http-equiv="X-Robots-Tag" content="noindex, nofollow">
    <meta name="referrer" content="no-referrer">
    <title>الأرجنتين - مصر</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* CSS Variables for Theme */
        :root {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --card-bg: rgba(0, 0, 0, 0.6);
            --card-border: rgba(255, 255, 255, 0.1);
            --header-bg: rgba(0, 0, 0, 0.5);
            --button-bg-start: #667eea;
            --button-bg-end: #764ba2;
            --button-active-start: #f093fb;
            --button-active-end: #f5576c;
            --button-shadow: rgba(102, 126, 234, 0.4);
            --input-bg: rgba(255, 255, 255, 0.05);
            --input-border: rgba(255, 255, 255, 0.1);
            --spinner-color: #667eea;
            --error-color: #ff6b6b;
            --link-color: #667eea;
        }
        
        /* Light Theme */
        [data-theme="light"] {
            --bg-gradient-start: #f0f4f8;
            --bg-gradient-end: #e2e8f0;
            --text-primary: #1a202c;
            --text-secondary: #4a5568;
            --card-bg: rgba(255, 255, 255, 0.95);
            --card-border: rgba(0, 0, 0, 0.1);
            --header-bg: rgba(255, 255, 255, 0.95);
            --button-bg-start: #4299e1;
            --button-bg-end: #3182ce;
            --button-active-start: #ed64a6;
            --button-active-end: #d53f8c;
            --button-shadow: rgba(66, 153, 225, 0.4);
            --input-bg: rgba(0, 0, 0, 0.05);
            --input-border: rgba(0, 0, 0, 0.15);
            --spinner-color: #4299e1;
            --error-color: #e53e3e;
            --link-color: #3182ce;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px;
        }
        
        /* Header */
        .header {
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--card-border);
            padding: 15px 0;
            margin-bottom: 20px;
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-primary);
            text-decoration: none;
            text-shadow: 0 2px 10px var(--button-shadow);
            cursor: pointer;
            transition: color 0.3s ease;
        }
        
        /* Theme Toggle Button */
        .theme-toggle {
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 50px;
            padding: 8px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            font-size: 20px;
            color: var(--text-primary);
        }
        
        .theme-toggle:hover {
            transform: scale(1.05);
            border-color: var(--button-bg-start);
        }
        
        .theme-toggle:active {
            transform: scale(0.95);
        }
        
        .theme-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
        }
        
        .match-info {
            text-align: center;
            flex: 1;
            min-width: 200px;
        }
        
        .match-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 5px;
            transition: color 0.3s ease;
        }
        
        .match-league {
            font-size: 14px;
            color: var(--text-secondary);
            transition: color 0.3s ease;
        }
        
        /* Player Section - أبعاد سينمائية متجاوبة للمباريات */
        .player-wrapper {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--card-border);
            margin-bottom: 20px;
            transition: background 0.3s ease, border-color 0.3s ease;
            position: relative;
            padding-top: 56.25%; /* أبعاد شاشات العرض العريضة 16:9 */
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }
        
        /* Home Button */
        .home-button-wrapper {
            margin-bottom: 15px;
            text-align: center;
        }
        
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--button-bg-start) 0%, var(--button-bg-end) 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--button-shadow);
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--button-shadow);
        }

        .btn-home:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <!-- Header Content -->
    <header class="header">
        <div class="container header-content">
            <a class="logo" onclick="location.reload();">SportLive</a>
            
            <div class="match-info">
                <div class="match-title">الأرجنتين 🇦🇷 ضد مصر 🇪🇬</div>
                <div class="match-league">بث مباشر - سيرفر مشغل المطورين الذكي</div>
            </div>

            <button class="theme-toggle" id="themeToggleBtn" aria-label="Toggle Theme">
                <span class="theme-icon" id="themeIcon">🌙</span>
            </button>
        </div>
    </header>

    <!-- Main Section -->
    <main class="container">
        
        <div class="home-button-wrapper">
            <button class="btn-home" onclick="reloadStream();">🔄 تحديث سيرفر البث المباشر</button>
        </div>

        <div class="player-wrapper">
            <!-- استخدام المسار /player/ مع تفعيل ميزات منع الإعلانات وجدار حماية الـ Referrer -->
            <iframe id="liveIframe" src="https://strm01.vip" allowfullscreen="true" scrolling="no" allow="autoplay; encrypted-media" referrerpolicy="no-referrer"></iframe>
        </div>

    </main>

    <!-- JavaScript logic -->
    <script>
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const themeIcon = document.getElementById('themeIcon');
        const iframe = document.getElementById('liveIframe');

        // إعادة إنعاش البث عند الضغط على زر التحديث لفك أي حظر أو بطء
        function reloadStream() {
            iframe.src = iframe.src;
        }

        // كود تشغيل وتفعيل التبديل الفوري للوضع الليلي والنهاري الخاص بك
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            themeIcon.textContent = '☀️';
        }

        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'light') {
                document.documentElement.removeAttribute('data-theme');
                themeIcon.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                themeIcon.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            }
        });
    </script>
</body>
</html>
